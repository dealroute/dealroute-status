owner: dealroute
repo: dealroute-status

sites:
  - name: Marketing Site
    url: https://dealroute.ai
  - name: App (SaaS Platform)
    url: https://app.dealroute.ai
  - name: Orchestration (n8n)
    url: https://n8n.ipistrategicenterprises.com
    expectedStatusCodes:
      - 200
      - 301
      - 302
  - name: Database (Supabase)
    url: https://znidwphgmqacsmippeaw.supabase.co/rest/v1/
    method: GET
    headers:
      - "apikey: $SUPABASE_ANON_KEY"
    expectedStatusCodes:
      - 200
      - 401

status-website:
  cname: status.dealroute.ai
  name: DealRoute Status
  theme: dark
  navbar:
    - title: DealRoute
      href: https://dealroute.ai
    - title: App
      href: https://app.dealroute.ai
    - title: Support
      href: https://app.dealroute.ai/support

workflowSchedule:
  graphs: "0 0 * * *"
  responseTime: "0 23 * * *"
  staticSite: "0 1 * * *"
  summary: "0 0 * * *"
  updateTemplate: "0 0 * * *"
  updates: "*/5 * * * *"
  uptime: "*/5 * * * *"
