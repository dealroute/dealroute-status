<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DealRoute Status</title>
<style>
  :root { --bg: #0a0a0f; --card: #12121a; --border: #1e1e2e; --text: #e4e4ef; --muted: #8888a0; --green: #22c55e; --red: #ef4444; --yellow: #eab308; --indigo: #6366f1; --cyan: #06b6d4; }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; min-height: 100vh; }
  .container { max-width: 720px; margin: 0 auto; padding: 2rem 1rem; }
  header { text-align: center; margin-bottom: 2.5rem; }
  header h1 { font-size: 1.5rem; font-weight: 700; background: linear-gradient(135deg, var(--indigo), var(--cyan)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
  header p { color: var(--muted); font-size: 0.875rem; margin-top: 0.25rem; }
  .overall { text-align: center; padding: 1.5rem; border-radius: 0.75rem; border: 1px solid var(--border); background: var(--card); margin-bottom: 1.5rem; }
  .overall .dot { display: inline-block; width: 12px; height: 12px; border-radius: 50%; margin-right: 0.5rem; vertical-align: middle; }
  .overall .label { font-size: 1.125rem; font-weight: 600; vertical-align: middle; }
  .services { display: flex; flex-direction: column; gap: 0.75rem; margin-bottom: 2rem; }
  .service { display: flex; align-items: center; justify-content: space-between; padding: 1rem 1.25rem; border-radius: 0.75rem; border: 1px solid var(--border); background: var(--card); transition: border-color 0.15s; }
  .service:hover { border-color: #2e2e4e; }
  .service .name { font-weight: 500; font-size: 0.9375rem; }
  .service .meta { display: flex; align-items: center; gap: 1rem; }
  .service .response-time { color: var(--muted); font-size: 0.75rem; }
  .badge { display: inline-flex; align-items: center; gap: 0.375rem; padding: 0.25rem 0.625rem; border-radius: 9999px; font-size: 0.75rem; font-weight: 600; }
  .badge.up { background: rgba(34,197,94,0.15); color: var(--green); }
  .badge.down { background: rgba(239,68,68,0.15); color: var(--red); }
  .badge.degraded { background: rgba(234,179,8,0.15); color: var(--yellow); }
  .badge .dot { width: 6px; height: 6px; border-radius: 50%; }
  .badge.up .dot { background: var(--green); }
  .badge.down .dot { background: var(--red); }
  .badge.degraded .dot { background: var(--yellow); }
  nav { display: flex; justify-content: center; gap: 1.5rem; margin-bottom: 2rem; }
  nav a { color: var(--muted); text-decoration: none; font-size: 0.8125rem; transition: color 0.15s; }
  nav a:hover { color: var(--text); }
  .updated { text-align: center; color: var(--muted); font-size: 0.75rem; margin-top: 1.5rem; }
  .loading { text-align: center; color: var(--muted); padding: 3rem; }
  footer { text-align: center; color: var(--muted); font-size: 0.6875rem; margin-top: 2rem; padding-top: 1.5rem; border-top: 1px solid var(--border); }
  footer a { color: var(--muted); text-decoration: none; }
  footer a:hover { color: var(--text); }
</style>
</head>
<body>
<div class="container">
  <header>
    <h1>DealRoute Status</h1>
    <p>Platform health monitoring</p>
  </header>
  <nav>
    <a href="https://dealroute.ai">DealRoute</a>
    <a href="https://app.dealroute.ai">App</a>
    <a href="https://app.dealroute.ai/support">Support</a>
  </nav>
  <div id="content"><div class="loading">Loading status...</div></div>
  <footer>Powered by <a href="https://github.com/upptime/upptime">Upptime</a> &middot; <a href="https://github.com/dealroute/dealroute-status">Source</a></footer>
</div>
<script>
const REPO = 'dealroute/dealroute-status';
const SITES = [
  { key: 'marketing-site', name: 'Website' },
  { key: 'app-saa-s-platform', name: 'App' },
  { key: 'orchestration-n8n', name: 'Orchestration' },
  { key: 'database-supabase', name: 'Database' },
];

async function fetchStatus() {
  const results = [];
  for (const site of SITES) {
    try {
      const [histRes, rtRes] = await Promise.all([
        fetch('https://raw.githubusercontent.com/' + REPO + '/main/history/' + site.key + '.yml'),
        fetch('https://raw.githubusercontent.com/' + REPO + '/main/api/' + site.key + '/response-time.json'),
      ]);
      const histText = await histRes.text();
      const statusMatch = histText.match(/^status:\s*(.+)$/m);
      const codeMatch = histText.match(/^code:\s*(.+)$/m);
      const updatedMatch = histText.match(/^lastUpdated:\s*(.+)$/m);
      const rtJson = rtRes.ok ? await rtRes.json() : null;
      results.push({
        name: site.name,
        status: statusMatch ? statusMatch[1].trim() : 'unknown',
        code: codeMatch ? codeMatch[1].trim() : '',
        responseTime: rtJson ? rtJson.message : null,
        lastUpdated: updatedMatch ? updatedMatch[1].trim() : null,
      });
    } catch (e) {
      results.push({ name: site.name, status: 'unknown', code: '', responseTime: null, lastUpdated: null });
    }
  }
  return results;
}

function render(results) {
  const allUp = results.every(function(r) { return r.status === 'up'; });
  const anyDown = results.some(function(r) { return r.status === 'down'; });
  const overallLabel = anyDown ? 'Some Systems Down' : allUp ? 'All Systems Operational' : 'Partial Degradation';
  const overallColor = anyDown ? 'var(--red)' : allUp ? 'var(--green)' : 'var(--yellow)';

  const lastUpdate = results.map(function(r) { return r.lastUpdated; }).filter(Boolean).sort().pop();
  const updatedStr = lastUpdate ? new Date(lastUpdate).toLocaleString() : '';

  var html = '<div class="overall"><span class="dot" style="background:' + overallColor + '"></span><span class="label">' + overallLabel + '</span></div>';
  html += '<div class="services">';
  for (var i = 0; i < results.length; i++) {
    var r = results[i];
    var cls = r.status === 'up' ? 'up' : r.status === 'down' ? 'down' : 'degraded';
    var label = r.status === 'up' ? 'Operational' : r.status === 'down' ? 'Down' : 'Degraded';
    html += '<div class="service"><span class="name">' + r.name + '</span><div class="meta">';
    if (r.responseTime) html += '<span class="response-time">' + r.responseTime + '</span>';
    html += '<span class="badge ' + cls + '"><span class="dot"></span>' + label + '</span></div></div>';
  }
  html += '</div>';
  html += '<div class="updated">Checked every 5 minutes &middot; Page loaded: ' + new Date().toLocaleString() + '</div>';
  document.getElementById('content').innerHTML = html;
}

fetchStatus().then(render).catch(function() {
  document.getElementById('content').innerHTML = '<div class="loading">Unable to load status. Please try again later.</div>';
});
</script>
</body>
</html>
